# Compose "exécution seule" : utilise les images déjà construites (pas de code source).
# À utiliser APRÈS avoir build les images avec docker-compose.build.yml.
# Permet de supprimer le dossier source de l'instance : seules les images minifiées tournent.
services:
  typebot-db-docker:
    image: postgres:16
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - typebot-network

  typebot-redis:
    image: redis:alpine
    restart: always
    command: --requirepass Rb0t-redis-2026 --save 60 1 --loglevel warning
    healthcheck:
      test:
        ["CMD-SHELL", "redis-cli -a Rb0t-redis-2026 --no-auth-warning ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis-data:/data
    networks:
      - typebot-network

  typebot-minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: always
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
      - MINIO_API_CORS_ALLOW_ORIGIN=https://bot.richattpay.com,https://botview.richattpay.com
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio-data:/data
    networks:
      - typebot-network

  typebot-builder:
    image: rbot-typebot-builder
    restart: always
    depends_on:
      typebot-db-docker:
        condition: service_healthy
      typebot-redis:
        condition: service_healthy
      typebot-minio:
        condition: service_started
    ports:
      - "8200:3000"
    networks:
      - typebot-network
    env_file: .env.docker
    environment:
      - REDIS_URL=redis://:Rb0t-redis-2026@typebot-redis:6379

  typebot-viewer:
    image: rbot-typebot-viewer
    restart: always
    depends_on:
      typebot-db-docker:
        condition: service_healthy
      typebot-redis:
        condition: service_healthy
      typebot-minio:
        condition: service_started
    ports:
      - "8201:3000"
    networks:
      - typebot-network
    env_file: .env.docker
    environment:
      - REDIS_URL=redis://:Rb0t-redis-2026@typebot-redis:6379

networks:
  typebot-network:
    driver: bridge

volumes:
  db-data:
    external: true
    name: rbot_db-data
  redis-data:
    external: true
    name: rbot_redis-data
  minio-data:
    external: true
    name: rbot_minio-data
